<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
</head>
<style>
    * {
    margin: 0;
    padding: 0;
}

.cabecalho { 
    background-color: #40a2e4; 
    padding: 15px 25px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  } 


.cartao {
    width: 260px;
    height: 200px;
}

.cartao-frente, .cartao-verso {
    width: 100%;
}

.cartao-imagem {
    width: 100%;
}

body { 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh; 
    background-color: #DDD9CE; 
  } 

  main { 
    flex: 1; 
  } 

  .cabecalho-link { 
    color: #fff; 
    text-decoration: none; 
  } 

  h1 { 
    color: #fff; 
    font-size: 24px; 
  } 

  footer { 
    background-color: #40a2e4; 
    padding: 15px 25px; 
    color: #fff; 
  } 
</style>
<body>

    <header class= "cabecalho"> 
        <h1> Confere AI!</h1>
        <nav>
          <a href="#" class="cabecalho-link">Início</a>
        </nav>
    </header>
   <main> 
  <h2>Descubra a verdade passando o mouse</h2> 
  <section> 
    <article class="cartao"> 
      <div class="cartao-interno"> 
        <div class="cartao-interno"> 
          <img src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849" alt="Pinguim" class="cartao-imagem"> 
          <p>Pinguins conseguem voar como pássaros!</p> 
        </div> 
        <div class="cartao-verso"> 
          <img src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849" alt="Pinguim" class="cartao-imagem"> 
          <p>Pinguins não voam, mas são excelentes nadadores.</p> 
        </div> 
      </div> 
    </article> 
  </section> 
</main> 
  <footer> 
  <p>Projeto feito por Douglas </p> 
</footer> 

</body>
</html>
