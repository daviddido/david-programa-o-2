<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>pinguin ai</title>

    <style>
        * {
        margin: 0;
        padding: 0;
    }
    
    .cabecalho { 
        background-color: #87bee2; 
        padding: 15px 25px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
      } 
    
    
    .cartao {
        width: 260px;
        height: 200px;
    }
    
    .cartao-frente, .cartao-verso {
        width: 100%;
    }
    
    .cartao-imagem {
        width: 100%;
    }
    
    body { 
        display: flex; 
        flex-direction: column; 
        min-height: 100vh; 
        background-color: #2c5db8; 
      } 
    
      main { 
        flex: 1; 
        display:flex;
        flex-direction: column;
        align-items: center;
      } 
    
      .cabecalho-link { 
        color: #fff; 
        text-decoration: none; 
      } 
    
      h1 { 
        color: #fff; 
        font-size: 24px; 
      } 
    
      footer { 
        background-color: #045388; 
        padding: 5px 20px; 
        color: #fff; 
      } 

      .cartao-interno {
        position: relative;
        transition: transform 0.8s;
        transform-style: preserve-3d;
      }
      .cartao:hover .cartao-interno {
       transform: rotateY(180deg);

      }


      .cartao-frente, .cartao-verso {
        position:absolute;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        backface-visibility: hidden;
      
      }
      .cartao-verso {
        transform: rotateY(180deg);

      }
    </style>
</head>
<body>

    <header class= "cabecalho"> 
        <h1> Confere AI!</h1>
        <nav>
          <a href="#" class="cabecalho-link">Início</a>
        </nav>
    </header>
   <main> 
  <h2>Descubra a verdade passando o mouse</h2> 
  <section> 
    <article class="cartao"> 
      <div class="cartao-interno"> 
        <div class="cartao-interno"> 
          <img src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849" alt="Pinguim" class="cartao-imagem"> 
          <p>Pinguins conseguem voar como pássaros!</p> 
        </div> 
        <div class="cartao-verso"> 
          <img src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849" alt="Pinguim" class="cartao-imagem"> 
          <p>Pinguins não voam, mas são excelentes nadadores.</p> 
        </div> 
      </div> 
    </article> 
  </section> 
</main> 
  <footer> 
  <p>isso foi feito por david </p> 
</footer> 

</body>
</html>
